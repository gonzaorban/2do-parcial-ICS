services:
  web:
    build:
      context: .
      target: dev
    container_name: excuse-generator-dev
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    command: npm run dev

volumes:
  node_modules:
  next_cache:
