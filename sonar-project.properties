sonar.projectKey=gonzaorban_2do-parcial-ICS
sonar.organization=gonzaorban

sonar.sources=src
sonar.tests=tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=node_modules/**,coverage/**,dist/**,.next/**,.github/**

# App Router presentation components (page.tsx / layout.tsx) are pure JSX with no
# testable logic. They are excluded from coverage measurement so the quality gate
# (new_coverage >= 80%) does not fail on UI-only changes. This only excludes them
# from coverage, not from bug/security analysis (unlike sonar.exclusions).
sonar.coverage.exclusions=src/app/**/page.tsx,src/app/**/layout.tsx

sonar.sourceEncoding=UTF-8