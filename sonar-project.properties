sonar.projectKey=gonzaorban_2do-parcial-ICS
sonar.organization=gonzaorban

sonar.sources=src
sonar.tests=tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=node_modules/**,coverage/**,dist/**,.next/**,.github/**

# App Router files (page.tsx / layout.tsx / route handler) and the React UI
# components are excluded from coverage measurement so the quality gate
# (new_coverage >= 80%) does not fail on presentation code. This only excludes
# them from coverage, not from bug/security analysis (unlike sonar.exclusions).
# Must stay aligned with collectCoverageFrom in jest.config.mjs.
sonar.coverage.exclusions=src/app/**/page.tsx,src/app/**/layout.tsx,src/app/**/route.ts,src/components/**

sonar.sourceEncoding=UTF-8