sonar.projectKey=gonzaorban_2do-parcial-ICS
sonar.organization=gonzaorban

sonar.sources=src
sonar.tests=tests
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=node_modules/**,coverage/**,dist/**,.next/**,.github/**

# App Router presentation components (page.tsx / layout.tsx) and the API route
# handler are excluded from coverage measurement so the quality gate
# (new_coverage >= 80%) does not fail on these thin App Router files. This only
# excludes them from coverage, not from bug/security analysis (unlike sonar.exclusions).
# Must stay aligned with collectCoverageFrom in jest.config.mjs.
sonar.coverage.exclusions=src/app/**/page.tsx,src/app/**/layout.tsx,src/app/**/route.ts

sonar.sourceEncoding=UTF-8