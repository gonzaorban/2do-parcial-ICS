name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: production
      url: ${{ steps.vercel.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: vercel
        run: |
          deploy_url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} | tail -n1)
          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"
          echo "url=https://gonzaorban-ics.vercel.app/" >> "$GITHUB_OUTPUT"

      - name: Notify Discord on success
        if: success() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          url="${{ steps.vercel.outputs.url }}"
          short_sha="${GITHUB_SHA:0:7}"
          curl -sf -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d @- <<EOF
          {
            "embeds": [{
              "title": "🚀 Deploy a Vercel OK",
              "description": "La app está en producción.",
              "color": 3066993,
              "fields": [
                { "name": "URL", "value": "$url" },
                { "name": "Commit", "value": "\`$short_sha\`", "inline": true }
              ]
            }]
          }
          EOF

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d @- <<EOF
          {
            "embeds": [{
              "title": "🔥 Deploy a Vercel falló",
              "description": "El deploy a producción no se completó.",
              "url": "$run_url",
              "color": 15158332,
              "fields": [
                { "name": "Run", "value": "[Ver logs]($run_url)" }
              ]
            }]
          }
          EOF
