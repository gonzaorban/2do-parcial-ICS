name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        id: format
        run: npm run format:check

      - name: Lint
        id: lint
        run: npm run lint

      - name: Unit tests
        id: test
        run: npm test -- --ci --coverage

      - name: Build
        id: build
        run: npm run build

      - name: SonarQube Scan
        id: sonar
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_WEBHOOK != ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          # Determinar qué step falló (el primero con outcome=failure)
          failed_step="(desconocido)"
          if [ "${{ steps.format.outcome }}" = "failure" ]; then failed_step="Format check"; fi
          if [ "${{ steps.lint.outcome }}"   = "failure" ]; then failed_step="Lint"; fi
          if [ "${{ steps.test.outcome }}"   = "failure" ]; then failed_step="Unit tests"; fi
          if [ "${{ steps.build.outcome }}"  = "failure" ]; then failed_step="Build"; fi
          if [ "${{ steps.sonar.outcome }}"  = "failure" ]; then failed_step="SonarQube"; fi

          # Distinguir si el run viene de un PR o de un push a main
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            context="PR #${{ github.event.pull_request.number }} (\`${{ github.head_ref }}\`)"
            commit_sha="${{ github.event.pull_request.head.sha }}"
          else
            context="main (push)"
            commit_sha="${{ github.sha }}"
          fi

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          commit_url="${{ github.server_url }}/${{ github.repository }}/commit/$commit_sha"
          short_sha="${commit_sha:0:7}"
          curl -sf -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" -d @- <<EOF
          {
            "embeds": [{
              "title": "❌ CI falló — $failed_step",
              "description": "Autor: ${{ github.actor }}",
              "url": "$run_url",
              "color": 15158332,
              "fields": [
                { "name": "Contexto", "value": "$context", "inline": true },
                { "name": "Paso que falló", "value": "$failed_step", "inline": true },
                { "name": "Commit", "value": "[\`$short_sha\`]($commit_url)", "inline": true },
                { "name": "Run", "value": "[Ver logs]($run_url)", "inline": true }
              ]
            }]
          }
          EOF
